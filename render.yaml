# Render Blueprint - Deploy both backend and frontend
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: spendsmart-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: MONGO_URI
        sync: false  # You'll set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your frontend URL after deployment

  # Frontend Static Site
  - type: web
    name: spendsmart-app
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to https://spendsmart-api.onrender.com/api after backend deploys
